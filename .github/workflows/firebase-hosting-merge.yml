# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: npm ci && npm run build
        env:
          VITE_ADMIN_PASSWORD: ${{ secrets.VITE_ADMIN_PASSWORD }}
      - run: npm install -g firebase-tools
      - run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_GRATITUDESHARING_FAAEC }}' > "$RUNNER_TEMP/firebase-sa.json"
          firebase deploy --only hosting --project gratitudesharing-faaec
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
